<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ - Ranking</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}
			body {
				font-family: 'Montserrat', sans-serif;
				background: #eef4ff;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				overflow: hidden;
				padding: 1.25rem 2rem;
			}
			.container {
				width: 100%;
				max-width: 800px;
				height: 100%;
				display: flex;
				flex-direction: column;
				justify-content: center;
			}
			.title {
				font-size: 15px;
				font-weight: 700;
				color: #888;
				text-transform: uppercase;
				letter-spacing: 2px;
				text-align: center;
				margin-bottom: clamp(1rem, 2.4vh, 2rem);
			}

			/* PODIUM */
			.podium {
				display: flex;
				align-items: flex-end;
				justify-content: center;
				gap: 12px;
				margin-bottom: clamp(0.9rem, 2vh, 1.6rem);
			}
			.podium-item {
				flex: 1;
				display: flex;
				flex-direction: column;
				align-items: center;
				gap: 12px;
			}
			.trophy {
				font-size: 36px;
				line-height: 1;
			}
			.avatar {
				width: 70px;
				height: 70px;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 26px;
				font-weight: 900;
			}
			.avatar-gold {
				background: #ffd700;
				color: #7a4a00;
				border: 3px solid #c9960a;
				width: 84px;
				height: 84px;
				font-size: 32px;
			}
			.avatar-silver {
				background: #ff8c42;
				color: #7a2a00;
				border: 3px solid #d9621a;
			}
			.avatar-bronze {
				background: #38bdf8;
				color: #004a7a;
				border: 3px solid #0e86c8;
			}

			.user-name {
				font-size: 16px;
				font-weight: 700;
				color: #1a1a1a;
				text-align: center;
			}
			.user-stats {
				font-size: 13px;
				color: #555;
				text-align: center;
				line-height: 1.8;
				font-weight: 500;
			}

			.bar {
				width: 100%;
				border-radius: 14px 14px 0 0;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.bar-1 {
				height: min(240px, 25vh);
				background: #ffd700;
				border: 3px solid #c9960a;
				border-bottom: none;
			}
			.bar-2 {
				height: min(160px, 17vh);
				background: #ff8c42;
				border: 3px solid #d9621a;
				border-bottom: none;
			}
			.bar-3 {
				height: min(120px, 13vh);
				background: #38bdf8;
				border: 3px solid #0e86c8;
				border-bottom: none;
			}

			.bar-num-1 {
				font-size: 72px;
				font-weight: 900;
				color: #7a4a00;
			}
			.bar-num-2 {
				font-size: 56px;
				font-weight: 900;
				color: #7a2a00;
			}
			.bar-num-3 {
				font-size: 56px;
				font-weight: 900;
				color: #004a7a;
			}

			/* LIST */
			.list {
				border-radius: 20px;
				overflow: hidden;
				box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
				background: #fff;
			}
			.list-header {
				display: grid;
				grid-template-columns: 56px 1fr auto;
				gap: 16px;
				padding: 14px 24px;
				background: #f4f4f4;
				border-bottom: 2px solid #e5e5e5;
			}
			.list-header span {
				font-size: 13px;
				font-weight: 700;
				color: #aaa;
				text-transform: uppercase;
				letter-spacing: 1px;
			}
			.list-row {
				display: grid;
				grid-template-columns: 56px 1fr auto;
				align-items: center;
				gap: 16px;
				padding: 20px 24px;
				border-bottom: 2px solid #f0f0f0;
				transition: background 0.15s;
			}
			.list-row:last-child {
				border-bottom: none;
			}
			.list-row.first {
				background: #fffbe6;
			}
			.list-row:hover {
				background: #f8f8f8;
			}
			.list-row.first:hover {
				background: #fff8d6;
			}

			.rank-num {
				font-size: 22px;
				font-weight: 900;
				color: #ccc;
				text-align: center;
			}
			.rank-num.gold {
				color: #c9960a;
			}
			.rank-num.silver {
				color: #d9621a;
			}
			.rank-num.bronze {
				color: #0e86c8;
			}

			.user-cell {
				display: flex;
				align-items: center;
				gap: 16px;
			}
			.mini-avatar {
				width: 52px;
				height: 52px;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				font-size: 20px;
				font-weight: 900;
				flex-shrink: 0;
			}
			.mini-avatar.gold {
				background: #ffd700;
				color: #7a4a00;
				border: 2px solid #c9960a;
			}
			.mini-avatar.silver {
				background: #ff8c42;
				color: #7a2a00;
				border: 2px solid #d9621a;
			}
			.mini-avatar.bronze {
				background: #38bdf8;
				color: #004a7a;
				border: 2px solid #0e86c8;
			}

			.user-label {
				font-size: 18px;
				font-weight: 700;
				color: #1a1a1a;
			}
			.score {
				font-size: 16px;
				font-weight: 700;
				color: #888;
				white-space: nowrap;
				background: #f4f4f4;
				padding: 6px 16px;
				border-radius: 30px;
			}
			.list-row.first .score {
				background: #ffd70033;
				color: #a07000;
			}

			@media (max-height: 860px) {
				body {
					padding: 0.9rem 1.4rem;
				}
				.title {
					margin-bottom: 0.8rem;
				}
				.podium {
					margin-bottom: 0.9rem;
				}
				.user-name {
					font-size: 15px;
				}
				.user-stats {
					font-size: 12px;
					line-height: 1.5;
				}
				.list-row {
					padding: 14px 20px;
				}
			}
		</style>
	</head>
	<body>
		<div class="container">
			<p class="title">最もアクティブなユーザー</p>

			<div class="podium">
				<!-- 2nd -->
				<div class="podium-item">
					<div class="avatar avatar-silver">I</div>
					<div class="user-name">Ibrat</div>
					<div class="user-stats">498 単語<br />4 レッスン</div>
					<div class="bar bar-2"><span class="bar-num-2">2</span></div>
				</div>

				<!-- 1st -->
				<div class="podium-item">
					<div class="trophy">🏆</div>
					<div class="avatar avatar-gold">M</div>
					<div class="user-name">Mirzayev Temurbek</div>
					<div class="user-stats">1059 単語<br />15 レッスン</div>
					<div class="bar bar-1"><span class="bar-num-1">1</span></div>
				</div>

				<!-- 3rd -->
				<div class="podium-item">
					<div class="avatar avatar-bronze">S</div>
					<div class="user-name">Ismoilova Soliha</div>
					<div class="user-stats">434 単語<br />8 レッスン</div>
					<div class="bar bar-3"><span class="bar-num-3">3</span></div>
				</div>
			</div>

			<div class="list">
				<div class="list-header">
					<span style="text-align: center">#</span>
					<span>ユーザー</span>
					<span>単語 · レッスン</span>
				</div>

				<div class="list-row first">
					<span class="rank-num gold">1</span>
					<div class="user-cell">
						<div class="mini-avatar gold">M</div>
						<span class="user-label">Mirzayev Temurbek</span>
					</div>
					<span class="score">1059 · 15</span>
				</div>

				<div class="list-row">
					<span class="rank-num silver">2</span>
					<div class="user-cell">
						<div class="mini-avatar silver">I</div>
						<span class="user-label">Ibrat</span>
					</div>
					<span class="score">498 · 4</span>
				</div>

				<div class="list-row">
					<span class="rank-num bronze">3</span>
					<div class="user-cell">
						<div class="mini-avatar bronze">S</div>
						<span class="user-label">Ismoilova Soliha</span>
					</div>
					<span class="score">434 · 8</span>
				</div>
			</div>
		</div>
	</body>
</html>
