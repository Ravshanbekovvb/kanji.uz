<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ - Barcha slaydlar</title>
		<style>
			:root {
				--slide-width: 1280px;
				--slide-height: 720px;
				--gap: 28px;
				--bg: #eef2f7;
				--card: #ffffff;
				--text: #1f2937;
				--muted: #6b7280;
				--line: #dbe3ee;
				--brand: #2563eb;
			}

			* {
				box-sizing: border-box;
			}

			body {
				margin: 0;
				font-family: 'Segoe UI', Tahoma, sans-serif;
				background: radial-gradient(circle at top left, #f7fbff, var(--bg) 45%);
				color: var(--text);
			}

			.app {
				max-width: calc(var(--slide-width) + 64px);
				margin: 0 auto;
				padding: 18px 16px 40px;
			}

			.toolbar {
				display: flex;
				justify-content: space-between;
				align-items: center;
				gap: 10px;
				margin-bottom: 18px;
				flex-wrap: wrap;
			}

			.toolbar-left {
				display: flex;
				align-items: center;
				gap: 10px;
				flex-wrap: wrap;
			}

			.btn {
				border: 1px solid #c9d5e5;
				background: #fff;
				color: #1f2937;
				padding: 10px 14px;
				border-radius: 10px;
				font-size: 14px;
				font-weight: 600;
				cursor: pointer;
			}

			.btn:hover {
				background: #f8fbff;
			}

			.btn-primary {
				background: var(--brand);
				color: #fff;
				border-color: #1d4ed8;
			}

			.btn-primary:hover {
				background: #1d4ed8;
			}

			.counter {
				font-size: 14px;
				color: var(--muted);
				font-weight: 600;
			}

			.page {
				display: block;
			}

			h1 {
				margin: 0 0 8px;
				font-size: 28px;
			}

			.subtitle {
				margin: 0 0 24px;
				font-size: 15px;
				color: var(--muted);
			}

			#slides {
				display: flex;
				flex-direction: column;
				gap: var(--gap);
			}

			#presentation {
				display: none;
			}

			.stage {
				background: #0f172a;
				border-radius: 14px;
				padding: 12px;
				box-shadow: 0 12px 28px rgba(15, 23, 42, 0.25);
			}

			.stage-frame {
				width: 100%;
				height: var(--slide-height);
				border: 0;
				border-radius: 10px;
				display: block;
				background: #fff;
			}

			.stage-frame.anim-next {
				animation: slideInFromRight 0.42s ease;
			}

			.stage-frame.anim-prev {
				animation: slideInFromLeft 0.42s ease;
			}

			@keyframes slideInFromRight {
				from {
					opacity: 0.3;
					transform: translateX(44px) scale(0.985);
				}
				to {
					opacity: 1;
					transform: translateX(0) scale(1);
				}
			}

			@keyframes slideInFromLeft {
				from {
					opacity: 0.3;
					transform: translateX(-44px) scale(0.985);
				}
				to {
					opacity: 1;
					transform: translateX(0) scale(1);
				}
			}

			.help {
				margin-top: 12px;
				font-size: 13px;
				color: #7b8798;
			}

			.slide-section {
				background: var(--card);
				border: 1px solid var(--line);
				border-radius: 14px;
				padding: 12px;
				box-shadow: 0 10px 24px rgba(25, 40, 62, 0.08);
			}

			.slide-label {
				display: inline-block;
				margin: 0 0 10px;
				padding: 4px 10px;
				border-radius: 999px;
				background: #f1f5f9;
				color: #334155;
				font-size: 13px;
				font-weight: 700;
			}

			.slide-frame {
				width: 100%;
				height: var(--slide-height);
				border: 0;
				display: block;
				border-radius: 10px;
			}

			@media (max-width: 1320px) {
				.app {
					max-width: 100%;
				}
				.slide-section {
					overflow-x: auto;
				}
				.slide-frame {
					width: var(--slide-width);
				}
				.stage {
					overflow-x: auto;
				}
				.stage-frame {
					width: var(--slide-width);
				}
			}
		</style>
	</head>
	<body>
		<div class="app">
			<div class="toolbar">
				<div class="toolbar-left">
					<button class="btn" id="previewBtn" type="button">Oddiy Preview</button>
					<button class="btn btn-primary" id="presentationBtn" type="button">
						View Presentation
					</button>
					<button class="btn" id="fullscreenBtn" type="button">Fullscreen</button>
					<button class="btn" id="prevBtn" type="button">← Oldingi</button>
					<button class="btn" id="nextBtn" type="button">Keyingi →</button>
				</div>
				<div class="counter" id="counter">1 / 8</div>
			</div>

			<div class="page" id="preview">
				<div id="slides"></div>
			</div>

			<div id="presentation">
				<div class="stage" id="stageContainer">
					<iframe
						class="stage-frame"
						id="stageFrame"
						src="1.html"
						title="Presentation slide"
					></iframe>
				</div>
				<p class="help">
					Keyboard: ← oldingi, → keyingi, Home birinchi, End oxirgi, F fullscreen, Esc chiqish.
				</p>
			</div>
		</div>

		<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
		<script>
			$(function () {
				const totalSlides = 8
				const $slides = $('#slides')
				const $preview = $('#preview')
				const $presentation = $('#presentation')
				const $frame = $('#stageFrame')
				const $counter = $('#counter')
				const $stage = $('#stageContainer')
				let currentIndex = 1
				let isPresentationMode = false

				function updateCounter() {
					$counter.text(currentIndex + ' / ' + totalSlides)
				}

				function renderStage(direction) {
					$frame.removeClass('anim-next anim-prev')
					if (direction === 'next') {
						$frame.addClass('anim-next')
					}
					if (direction === 'prev') {
						$frame.addClass('anim-prev')
					}
					$frame.attr('src', currentIndex + '.html')
					updateCounter()
					setTimeout(function () {
						$frame.removeClass('anim-next anim-prev')
					}, 450)
				}

				function setMode(presentation) {
					isPresentationMode = presentation
					if (presentation) {
						$preview.hide()
						$presentation.show()
						renderStage()
					} else {
						$presentation.hide()
						$preview.show()
					}
				}

				function goNext() {
					if (currentIndex < totalSlides) {
						currentIndex += 1
						renderStage('next')
					}
				}

				function goPrev() {
					if (currentIndex > 1) {
						currentIndex -= 1
						renderStage('prev')
					}
				}

				function toggleFullscreen() {
					const root = $stage.get(0)
					if (!document.fullscreenElement) {
						if (root.requestFullscreen) {
							root.requestFullscreen()
						}
					} else if (document.exitFullscreen) {
						document.exitFullscreen()
					}
				}

				for (let i = 1; i <= totalSlides; i += 1) {
					const fileName = i + '.html'
					const $section = $('<section>', { class: 'slide-section', id: 'slide-' + i })
					const $label = $('<p>', { class: 'slide-label', text: 'Slide ' + i + ' - ' + fileName })
					const $frame = $('<iframe>', {
						class: 'slide-frame',
						src: fileName,
					})

					$section.on('dblclick', function () {
						currentIndex = i
						setMode(true)
					})

					$section.append($label, $frame)
					$slides.append($section)
				}

				$('#previewBtn').on('click', function () {
					setMode(false)
				})

				$('#presentationBtn').on('click', function () {
					setMode(true)
				})

				$('#fullscreenBtn').on('click', function () {
					if (!isPresentationMode) {
						setMode(true)
					}
					toggleFullscreen()
				})

				$('#nextBtn').on('click', goNext)
				$('#prevBtn').on('click', goPrev)

				$(document).on('keydown', function (event) {
					if (event.key === 'ArrowRight') {
						if (!isPresentationMode) {
							setMode(true)
						}
						goNext()
					}

					if (event.key === 'ArrowLeft') {
						if (!isPresentationMode) {
							setMode(true)
						}
						goPrev()
					}

					if (event.key === 'Home') {
						if (!isPresentationMode) {
							setMode(true)
						}
						currentIndex = 1
						renderStage('prev')
					}

					if (event.key === 'End') {
						if (!isPresentationMode) {
							setMode(true)
						}
						currentIndex = totalSlides
						renderStage('next')
					}

					if (event.key.toLowerCase() === 'f') {
						if (!isPresentationMode) {
							setMode(true)
						}
						toggleFullscreen()
					}

					if (event.key === 'Escape') {
						if (document.fullscreenElement && document.exitFullscreen) {
							document.exitFullscreen()
						}
						setMode(false)
					}
				})

				setMode(false)
				updateCounter()
			})
		</script>
	</body>
</html>
