<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ - Traction</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>

		<style>
			body {
				margin: 0;
				padding: 0;
				height: 100vh;
				background-color: #f7f9fb;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
			}

			.slide-container {
				width: 100%;
				height: 100vh;
				display: flex;
				justify-content: center;
				align-items: center;
				position: relative;
				background-color: #ffffff;
				overflow: hidden;
				padding: 40px;
				text-align: center;
				box-sizing: border-box;
			}

			.blob {
				position: absolute;
				border-radius: 50%;
				z-index: 1;
			}

			.blob-1 {
				width: 500px;
				height: 500px;
				background: #58cc02;
				top: -150px;
				left: -150px;
				opacity: 0.08;
			}

			.blob-2 {
				width: 400px;
				height: 400px;
				background: #1cb0f6;
				bottom: -100px;
				right: -100px;
				opacity: 0.08;
			}

			.content {
				z-index: 2;
				max-width: 900px;
			}

			.badge {
				background-color: #ff9600;
				color: white;
				padding: 10px 20px;
				border-radius: 12px;
				font-weight: 800;
				font-size: 14px;
				margin-bottom: 20px;
				display: inline-block;
				box-shadow: 0 4px 0 #cc7a00;
			}

			h1 {
				font-size: clamp(32px, 6vw, 60px);
				font-weight: 900;
				color: #3c3c3c;
				margin-bottom: 30px;
			}

			.stats {
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 20px;
			}

			.stat-box {
				background: #fff;
				border: 2px solid #f0f0f0;
				border-radius: 20px;
				padding: 25px;
				min-width: 180px;
				box-shadow: 0 6px 0 #f0f0f0;
			}

			.stat-number {
				font-size: 32px;
				font-weight: 900;
				color: #58cc02;
			}

			.stat-label {
				font-size: 14px;
				color: #777;
				margin-top: 5px;
				font-weight: 600;
			}

			.highlight {
				margin-top: 30px;
				font-size: 18px;
				font-weight: 700;
				color: #555;
			}
		</style>
	</head>

	<body>
		<div class="slide-container">
			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>

			<div class="content">
				<div class="badge">Traction</div>

				<h1>Biz allaqachon o‘sishni boshladik 🚀</h1>

				<div class="stats">
					<div class="stat-box">
						<div class="stat-number">47</div>
						<div class="stat-label">Foydalanuvchi</div>
					</div>

					<div class="stat-box">
						<div class="stat-number">60+</div>
						<div class="stat-label">Darslar</div>
					</div>

					<div class="stat-box">
						<div class="stat-number">2800+</div>
						<div class="stat-label">So‘zlar</div>
					</div>
				</div>

				<div class="highlight">
					🔥 Eng faol foydalanuvchi — 89 kun davomida platformadan foydalangan
				</div>
			</div>
		</div>
	</body>
</html>
