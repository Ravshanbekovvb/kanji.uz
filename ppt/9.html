<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ - The Ask</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>

		<style>
			body {
				margin: 0;
				padding: 0;
				height: 100vh;
				background-color: #f4f6fb;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
			}

			.slide-container {
				width: 100%;
				height: 100vh;
				position: relative;
				display: flex;
				justify-content: center;
				align-items: center;
				background-color: #ffffff;
				overflow: hidden;
				padding: 40px;
				text-align: center;
				box-sizing: border-box;
			}

			.blob {
				position: absolute;
				border-radius: 50%;
				z-index: 1;
			}

			.blob-1 {
				width: 500px;
				height: 500px;
				background: #ff4b4b;
				top: -150px;
				right: -150px;
				opacity: 0.08;
			}

			.blob-2 {
				width: 400px;
				height: 400px;
				background: #ff9600;
				bottom: -100px;
				left: -100px;
				opacity: 0.08;
			}

			.content {
				z-index: 2;
				max-width: 940px;
			}

			.badge {
				background-color: #ff4b4b;
				color: white;
				padding: 10px 20px;
				border-radius: 12px;
				font-weight: 800;
				font-size: 14px;
				margin-bottom: 20px;
				display: inline-block;
				box-shadow: 0 4px 0 #cc0000;
			}

			h1 {
				font-size: clamp(32px, 6vw, 60px);
				font-weight: 900;
				color: #3c3c3c;
				margin-bottom: 20px;
			}

			.description {
				font-size: clamp(18px, 2.5vw, 26px);
				color: #666;
				line-height: 1.6;
				font-weight: 600;
				margin-block: 50px;
			}

			.use-boxes {
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 20px;
				margin-top: 20px;
			}

			.use-box {
				background: #fff;
				border: 2px solid #f0f0f0;
				border-radius: 20px;
				padding: 20px;
				min-width: 220px;
				box-shadow: 0 6px 0 #f0f0f0;
				font-weight: 700;
				color: #444;
			}

			.use-box i {
				display: block;
				font-size: 30px;
				margin-bottom: 10px;
				color: #ff4b4b;
			}
		</style>
	</head>

	<body>
		<div class="slide-container">
			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>

			<div class="content">
				<div class="badge">The Ask</div>

				<h1>Bizga investitsiya kerak</h1>

				<div class="description">
					Bizga kuchli server infratuzilmasi va AI integratsiyalarni kengaytirish uchun hamda
					mahsulotni reklama qilish uchun investitsiya kerak.
					<!-- Bu orqali foydalanuvchi tajribasini
					sezilarli darajada yaxshilaymiz va platformani kengaytiramiz. -->
				</div>

				<div class="use-boxes">
					<div class="use-box">
						<i class="fa-solid fa-server"></i>
						Kuchli server infratuzilmasi
					</div>

					<div class="use-box">
						<i class="fa-solid fa-brain"></i>
						AI integratsiyalarni kengaytirish
					</div>

					<div class="use-box">
						<i class="fa-solid fa-rocket"></i>
						Reklama va Marketing qilish
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
