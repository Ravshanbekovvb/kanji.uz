<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ PPT Player</title>
		<style>
			:root {
				color-scheme: light;
			}

			* {
				box-sizing: border-box;
			}

			html,
			body {
				width: 100%;
				height: 100%;
				margin: 0;
				padding: 0;
				background: #0b1020;
				font-family:
					Montserrat,
					Segoe UI,
					Arial,
					sans-serif;
				overflow: hidden;
			}

			.viewer {
				position: relative;
				width: 100vw;
				height: 100vh;
			}

			#slideFrame {
				width: 100%;
				height: 100%;
				border: 0;
				background: #111827;
			}

			.controls {
				position: fixed;
				left: 50%;
				bottom: 16px;
				transform: translateX(-50%);
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 10px 12px;
				border-radius: 999px;
				background: rgba(15, 23, 42, 0.78);
				backdrop-filter: blur(8px);
				color: #e5e7eb;
				z-index: 10;
			}

			.btn {
				appearance: none;
				border: 0;
				border-radius: 999px;
				padding: 8px 12px;
				font-size: 13px;
				font-weight: 700;
				cursor: pointer;
				background: #1f2937;
				color: #f9fafb;
			}

			.btn:hover {
				background: #374151;
			}

			.counter {
				min-width: 86px;
				text-align: center;
				font-size: 13px;
				font-weight: 700;
			}

			.hint {
				position: fixed;
				top: 12px;
				left: 50%;
				transform: translateX(-50%);
				padding: 6px 10px;
				border-radius: 8px;
				font-size: 12px;
				font-weight: 600;
				color: #d1d5db;
				background: rgba(17, 24, 39, 0.7);
				z-index: 10;
			}

			.is-fullscreen .hint,
			.is-fullscreen .controls {
				display: none;
			}
		</style>
	</head>
	<body>
		<div class="viewer">
			<iframe id="slideFrame" title="PPT Slide" allowfullscreen></iframe>
		</div>

		<div class="hint">Keyboard: Left/Right, Space, Home/End, F fullscreen, Esc exit</div>

		<div class="controls">
			<button class="btn" id="prevBtn" type="button">Prev</button>
			<div class="counter" id="counter">1 / 10</div>
			<button class="btn" id="nextBtn" type="button">Next</button>
			<button class="btn" id="fsBtn" type="button">Fullscreen</button>
		</div>

		<script>
			const slides = Array.from({ length: 10 }, (_, i) => `${i + 1}.html`)

			const slideFrame = document.getElementById('slideFrame')
			const counter = document.getElementById('counter')
			const prevBtn = document.getElementById('prevBtn')
			const nextBtn = document.getElementById('nextBtn')
			const fsBtn = document.getElementById('fsBtn')

			let currentIndex = 0

			const clamp = n => Math.min(Math.max(n, 0), slides.length - 1)

			const updateHash = () => {
				history.replaceState(null, '', `#${currentIndex + 1}`)
			}

			const render = () => {
				slideFrame.src = slides[currentIndex]
				counter.textContent = `${currentIndex + 1} / ${slides.length}`
				prevBtn.disabled = currentIndex === 0
				nextBtn.disabled = currentIndex === slides.length - 1
				updateHash()
			}

			const goTo = index => {
				currentIndex = clamp(index)
				render()
			}

			const next = () => goTo(currentIndex + 1)
			const prev = () => goTo(currentIndex - 1)

			const toggleFullscreen = async () => {
				if (!document.fullscreenElement) {
					await document.documentElement.requestFullscreen()
					fsBtn.textContent = 'Exit Fullscreen'
				} else {
					await document.exitFullscreen()
					fsBtn.textContent = 'Fullscreen'
				}
			}

			prevBtn.addEventListener('click', prev)
			nextBtn.addEventListener('click', next)
			fsBtn.addEventListener('click', toggleFullscreen)

			document.addEventListener('fullscreenchange', () => {
				document.body.classList.toggle('is-fullscreen', Boolean(document.fullscreenElement))
				fsBtn.textContent = document.fullscreenElement ? 'Exit Fullscreen' : 'Fullscreen'
			})

			document.addEventListener('keydown', e => {
				const tag = (e.target && e.target.tagName) || ''
				if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) {
					return
				}

				switch (e.key) {
					case 'ArrowRight':
					case 'PageDown':
					case ' ':
						e.preventDefault()
						next()
						break
					case 'ArrowLeft':
					case 'PageUp':
						e.preventDefault()
						prev()
						break
					case 'Home':
						e.preventDefault()
						goTo(0)
						break
					case 'End':
						e.preventDefault()
						goTo(slides.length - 1)
						break
					case 'f':
					case 'F':
						e.preventDefault()
						toggleFullscreen()
						break
					default:
						break
				}
			})

			window.addEventListener('hashchange', () => {
				const n = Number(window.location.hash.replace('#', ''))
				if (Number.isFinite(n) && n >= 1 && n <= slides.length) {
					goTo(n - 1)
				}
			})

			const initialFromHash = Number(window.location.hash.replace('#', ''))
			if (
				Number.isFinite(initialFromHash) &&
				initialFromHash >= 1 &&
				initialFromHash <= slides.length
			) {
				currentIndex = initialFromHash - 1
			}

			render()
		</script>
	</body>
</html>
