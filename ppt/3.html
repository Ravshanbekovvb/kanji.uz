<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ - Why You</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>

		<style>
			body {
				margin: 0;
				padding: 0;
				height: 100vh;
				background-color: #f7f9fb;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
			}

			.slide-container {
				width: 100%;
				height: 100vh;
				position: relative;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				background-color: #ffffff;
				overflow: hidden;
				padding: 40px;
				text-align: center;
				box-sizing: border-box;
			}

			/* Background */
			.blob {
				position: absolute;
				border-radius: 50%;
				z-index: 1;
			}

			.blob-1 {
				width: 500px;
				height: 500px;
				background: #58cc02;
				top: -150px;
				right: -150px;
				opacity: 0.08;
			}

			.blob-2 {
				width: 400px;
				height: 400px;
				background: #1cb0f6;
				bottom: -100px;
				left: -100px;
				opacity: 0.08;
			}

			.content {
				z-index: 2;
				max-width: 900px;
			}

			.badge {
				background-color: #58cc02;
				color: white;
				padding: 10px 20px;
				border-radius: 12px;
				font-weight: 800;
				font-size: 14px;
				margin-bottom: 20px;
				display: inline-block;
				box-shadow: 0 4px 0 #46a302;
			}

			h1 {
				font-size: clamp(32px, 6vw, 60px);
				font-weight: 900;
				color: #3c3c3c;
				margin-bottom: 20px;
			}

			.description {
				font-size: clamp(18px, 2.5vw, 24px);
				color: #666;
				line-height: 1.6;
				font-weight: 600;
				margin-bottom: 30px;
			}

			.current-box {
				background: #f0fdf4;
				border: 2px solid #d9f99d;
				border-radius: 20px;
				padding: 20px;
				font-weight: 700;
				color: #3c3c3c;
				box-shadow: 0 6px 0 #d9f99d;
			}

			.icons {
				margin-top: 30px;
				font-size: 36px;
				color: #bbb;
				display: flex;
				justify-content: center;
				gap: 30px;
			}

			.icons i:hover {
				color: #58cc02;
				transform: scale(1.2);
			}
		</style>
	</head>

	<body>
		<div class="slide-container">
			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>

			<div class="content">
				<div class="badge">Why You?</div>

				<h1>なぜ私たちなのか？</h1>

				<div class="description">
					私たちはKanji.uzプロジェクトを構築するための適切な人物です。なぜなら、日本語学習プロセスの問題を
					個人的に経験したからです。
					<!-- 学習者にとって便利で効果的なソリューションを作成するための強い動機を持っています。さらに、
					プログラミングの知識により、このアイデアを実際の製品に変えることができます。 -->
				</div>

				<div class="current-box">🚀 現在、MVPは準備ができており、主要機能が動作しています</div>

				<div class="icons">
					<i class="fa-solid fa-user"></i>
					<i class="fa-solid fa-code"></i>
					<i class="fa-solid fa-rocket"></i>
				</div>
			</div>
		</div>
	</body>
</html>
