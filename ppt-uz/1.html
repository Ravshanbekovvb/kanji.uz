<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>KANJI.UZ - Титульная страница</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+JP:wght@400;700&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>
		<style>
			body {
				margin: 0;
				padding: 0;
				min-height: 100vh;
				background-color: #f0f4f8;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow-x: hidden;
			}

			.slide-container {
				width: 100%;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				position: relative;
				background-color: #ffffff;
				overflow: hidden; /* Bloblar chiqib ketmasligi uchun */
			}

			/* Decorative Background Elements */
			.blob {
				position: absolute;
				border-radius: 50%;
				z-index: 1;
			}
			.blob-1 {
				width: 600px;
				height: 600px;
				background-color: #58cc02;
				top: -200px;
				right: -150px;
				opacity: 0.1;
			}
			.blob-2 {
				width: 400px;
				height: 400px;
				background-color: #1cb0f6;
				bottom: -100px;
				left: -100px;
				opacity: 0.1;
			}
			.blob-3 {
				width: 200px;
				height: 200px;
				background-color: #ff4b4b;
				top: 100px;
				left: 200px;
				opacity: 0.05;
			}

			.kanji-bg {
				position: absolute;
				font-family: 'Noto Sans JP', sans-serif;
				font-weight: 900;
				font-size: 20vw; /* Moslashuvchan o'lcham */
				color: rgba(0, 0, 0, 0.03);
				z-index: 0;
				pointer-events: none;
			}
			.kanji-1 {
				top: -5%;
				left: -5%;
				transform: rotate(-15deg);
			}
			.kanji-2 {
				bottom: -5%;
				right: -5%;
				transform: rotate(15deg);
			}

			/* Content Wrapper */
			.content-wrapper {
				z-index: 2;
				flex: 1;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				text-align: center;
				box-sizing: border-box;
			}

			.logo-icon {
				height: fit-content;
				color: #58cc02;
				background-color: #fff;
				border-radius: 27px;
				margin-bottom: 20px;
				box-shadow:
					0 6px 0 #46a302,
					0 10px 20px rgba(0, 0, 0, 0.1);
			}

			h1 {
				font-size: clamp(40px, 8vw, 90px); /* Ekran o'lchamiga qarab o'zgaradi */
				font-weight: 900;
				color: #3c3c3c;
				margin: 0;
				line-height: 1.1;
				letter-spacing: -2px;
				text-transform: uppercase;
			}

			.jp-sub {
				font-family: 'Noto Sans JP', sans-serif;
				color: #1cb0f6;
			}

			h2 {
				font-size: clamp(18px, 3vw, 28px);
				font-weight: 700;
				color: #777;
				margin: 15px 0 30px 0;
				max-width: 800px;
			}

			.features-row {
				display: flex;
				flex-wrap: wrap; /* Elementlar sig'masa pastga tushadi */
				gap: 15px;
				justify-content: center;
				margin-bottom: 40px;
			}

			.feature-tag {
				background-color: #fff;
				border: 2px solid #e5e5e5;
				border-radius: 12px;
				padding: 10px 20px;
				font-size: 16px;
				font-weight: 700;
				color: #4b4b4b;
				box-shadow: 0 4px 0 #e5e5e5;
				display: flex;
				align-items: center;
				gap: 8px;
			}

			.footer-cta {
				background-color: #58cc02;
				color: white;
				padding: 15px 50px;
				border-radius: 15px;
				font-size: 22px;
				font-weight: 800;
				box-shadow: 0 6px 0 #46a302;
				text-decoration: none;
				transition: transform 0.2s;
			}

			.footer-cta:active {
				transform: translateY(4px);
				box-shadow: 0 2px 0 #46a302;
			}

			.website-link {
				margin-top: 30px;
				font-size: clamp(14px, 2vw, 18px);
				color: #afafaf;
				font-weight: 600;
				max-width: 90%;
			}
		</style>
	</head>
	<body>
		<div class="slide-container">
			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>
			<div class="blob blob-3"></div>
			<div class="kanji-bg kanji-1">漢</div>
			<div class="kanji-bg kanji-2">字</div>

			<div class="content-wrapper">
				<img
					src="https://ravshanbekovvb.github.io/kanji.uz/ppt-uz/logo.png"
					alt=""
					style="width: 100px"
					class="logo-icon"
				/>

				<h1>KANJI.UZ</h1>

				<h2>
					Biz Core jamoasi, Kanji.uz ustida ishlayapmiz — bu platforma yapon tili o‘rganuvchilarga
					so‘zlarni qo‘lda kiritish muammosini bartaraf etib, AI yordamida tezroq va samaraliroq
					o‘rganish imkonini beradi.
				</h2>
			</div>
		</div>
	</body>
</html>
