<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ - Future Vision</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>

		<style>
			body {
				margin: 0;
				padding: 0;
				height: 100vh;
				background-color: #f7f9fb;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
			}

			.slide-container {
				width: 100%;
				height: 100vh;
				position: relative;
				display: flex;
				justify-content: center;
				align-items: center;
				background-color: #ffffff;
				overflow: hidden;
				padding: 40px;
				text-align: center;
				box-sizing: border-box;
			}

			/* Background */
			.blob {
				position: absolute;
				border-radius: 50%;
				z-index: 1;
			}

			.blob-1 {
				width: 500px;
				height: 500px;
				background: #58cc02;
				top: -150px;
				left: -150px;
				opacity: 0.08;
			}

			.blob-2 {
				width: 400px;
				height: 400px;
				background: #1cb0f6;
				bottom: -100px;
				right: -100px;
				opacity: 0.08;
			}

			.content {
				z-index: 2;
				max-width: 950px;
			}

			.badge {
				background-color: #1cb0f6;
				color: white;
				padding: 10px 20px;
				border-radius: 12px;
				font-weight: 800;
				font-size: 14px;
				margin-bottom: 20px;
				display: inline-block;
				box-shadow: 0 4px 0 #0b8ec2;
			}

			h1 {
				white-space: nowrap;
				font-size: clamp(32px, 6vw, 60px);
				font-weight: 900;
				color: #3c3c3c;
				margin-bottom: 20px;
			}

			.description {
				font-size: clamp(18px, 2.5vw, 26px);
				color: #666;
				line-height: 1.6;
				font-weight: 600;
				margin-block: 50px;
			}

			.features {
				display: flex;
				flex-wrap: wrap;
				justify-content: center;
				gap: 20px;
				margin-top: 30px;
			}

			.feature-box {
				background: #fff;
				border: 2px solid #f0f0f0;
				border-radius: 20px;
				padding: 20px;
				min-width: 220px;
				box-shadow: 0 6px 0 #f0f0f0;
				font-weight: 700;
				color: #444;
			}

			.feature-box i {
				display: block;
				font-size: 30px;
				margin-bottom: 10px;
				color: #1cb0f6;
			}
		</style>
	</head>

	<body>
		<div class="slide-container">
			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>

			<div class="content">
				<div class="badge">Future Vision</div>

				<h1>私たちの将来の計画🚀</h1>

				<div class="description">
					<!-- Kanji.uz’ni boshqa murakkab tillarga kengaytirib, AI orqali individual o‘qitish tizimini
					rivojlantiramiz. Shuningdek, o‘qituvchilar uchun platforma yaratib, ta’lim jarayonini
					to‘liq raqamlashtiramiz. -->
					ゲーミフィケーションを通じて顧客エンゲージメントを強化し、単語用のテストモードを開発する予定です。サブスクリプション料金も引き上げる予定ですが、
					これはユーザーにより多くの価値と機会を提供します。
				</div>

				<div class="features">
					<div class="feature-box">
						<i class="fa-solid fa-gamepad"></i>
						ゲーミフィケーション
					</div>

					<div class="feature-box">
						<i class="fa-solid fa-mobile-screen-button"></i>
						サブスクリプション料金の増加
					</div>

					<div class="feature-box">
						<i class="fa-solid fa-clipboard-check"></i>
						テストモード
					</div>
				</div>
			</div>
		</div>
	</body>
</html>
