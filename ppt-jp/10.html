<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ - Thank You</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Noto+Sans+JP:wght@700&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>

		<style>
			body {
				margin: 0;
				padding: 0;
				height: 100vh;
				background-color: #f0f4f8;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
			}

			.slide-container {
				width: 100%;
				height: 100vh;
				position: relative;
				display: flex;
				justify-content: center;
				align-items: center;
				background-color: #ffffff;
				overflow: hidden;
				text-align: center;
				padding: 40px;
				box-sizing: border-box;
			}

			/* Background */
			.blob {
				position: absolute;
				border-radius: 50%;
				z-index: 1;
			}

			.blob-1 {
				width: 500px;
				height: 500px;
				background: #58cc02;
				top: -150px;
				left: -150px;
				opacity: 0.08;
			}

			.blob-2 {
				width: 400px;
				height: 400px;
				background: #1cb0f6;
				bottom: -100px;
				right: -100px;
				opacity: 0.08;
			}

			.content {
				z-index: 2;
				max-width: 800px;
			}

			.brand-logo {
				position: absolute;
				top: 26px;
				left: 32px;
				z-index: 3;
				display: flex;
				align-items: center;
				gap: 10px;
				padding: 8px 12px;
				border-radius: 14px;
				background: rgba(255, 255, 255, 0.92);
				box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
			}

			.brand-logo img {
				height: 34px;
				width: auto;
				display: block;
			}

			h1 {
				white-space: nowrap;
				font-size: clamp(36px, 7vw, 80px);
				font-weight: 900;
				color: #3c3c3c;
				margin-bottom: 20px;
			}

			.jp {
				font-family: 'Noto Sans JP', sans-serif;
				color: #58cc02;
				font-size: clamp(28px, 5vw, 48px);
				margin-bottom: 20px;
			}

			.subtitle {
				font-size: clamp(18px, 2.5vw, 26px);
				color: #777;
				font-weight: 600;
				margin-bottom: 30px;
			}

			.contact {
				font-size: 18px;
				color: #555;
				font-weight: 700;
				margin-top: 20px;
			}

			.icons {
				margin-top: 30px;
				font-size: 28px;
				color: #bbb;
				display: flex;
				justify-content: center;
				gap: 25px;
			}

			.icons i:hover {
				color: #58cc02;
				transform: scale(1.2);
			}
		</style>
	</head>

	<body>
		<div class="slide-container">
			<div class="brand-logo">
				<img src="./logo.png" alt="KANJI.UZ logo" />
			</div>

			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>

			<div class="content">
				<div class="jp">rahmat!</div>
				<div style="display: flex; align-items: center; justify-content: center">
					<h1>ご関心ありがとうございました！</h1>
				</div>

				<div class="subtitle">質問がありますか？</div>
			</div>
		</div>
	</body>
</html>
