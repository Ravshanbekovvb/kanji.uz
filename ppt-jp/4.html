<!doctype html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta content="width=device-width, initial-scale=1.0" name="viewport" />
		<title>KANJI.UZ - Решение</title>
		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>
		<style>
			body {
				margin: 0;
				padding: 0;
				min-height: 100vh;
				background-color: #f0fdf4;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow-x: hidden;
			}

			.slide-container {
				width: 100%;
				min-height: 100vh;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				position: relative;
				background-color: #ffffff;
				overflow: hidden;
			}

			/* Decorative Background */
			.blob {
				position: absolute;
				border-radius: 50%;
				z-index: 1;
			}
			.blob-1 {
				width: 700px;
				height: 700px;
				background-color: #dcfce7;
				top: -350px;
				right: -200px;
				opacity: 0.6;
			}
			.blob-2 {
				width: 400px;
				height: 400px;
				background-color: #e0f2fe;
				bottom: -150px;
				left: -100px;
				opacity: 0.5;
			}

			.header {
				z-index: 2;
				padding: clamp(20px, 5vw, 40px) 20px;
				text-align: center;
			}

			.badge {
				background-color: #58cc02;
				color: white;
				font-weight: 800;
				padding: 8px 16px;
				border-radius: 12px;
				font-size: 14px;
				text-transform: uppercase;
				display: inline-block;
				margin-bottom: 15px;
				box-shadow: 0 4px 0 #46a302;
			}

			h1 {
				font-size: clamp(28px, 4vw, 48px);
				font-weight: 900;
				color: #3c3c3c;
				margin: 0;
			}

			.highlight {
				color: #58cc02;
			}

			/* Diagram Section */
			.diagram-container {
				flex: 1;
				z-index: 2;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 30px;
				padding: 20px;
				padding-top: 0;
				padding-top: 0;
				flex-wrap: wrap; /* Mobilda tushishi uchun */
			}

			/* Input Box */
			.input-section {
				background-color: #fff;
				border: 3px solid #e5e5e5;
				border-radius: 24px;
				padding: 30px;
				width: 260px;
				text-align: center;
				box-shadow: 0 8px 0 #e5e5e5;
			}

			.kanji-display {
				font-family: 'Noto Sans JP', sans-serif;
				font-size: 80px;
				font-weight: 900;
				color: #3c3c3c;
				margin: 10px 0;
			}

			/* Magic Arrow */
			.magic-arrow {
				display: flex;
				flex-direction: column;
				align-items: center;
				color: #58cc02;
				font-size: 40px;
				animation: pulse 2s infinite;
			}

			@keyframes pulse {
				0%,
				100% {
					transform: scale(1);
				}
				50% {
					transform: scale(1.1);
				}
			}

			.arrow-line {
				width: 80px;
				height: 4px;
				background-color: #58cc02;
				margin: 10px 0;
				position: relative;
			}

			.arrow-head {
				position: absolute;
				right: -10px;
				top: -8px;
				border-top: 10px solid transparent;
				border-bottom: 10px solid transparent;
				border-left: 15px solid #58cc02;
			}

			/* Output Grid */
			.output-section {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 18px;
				max-width: 550px;
			}

			.result-card {
				background-color: #fff;
				border-radius: 18px;
				padding: 20px;
				display: flex;
				align-items: flex-start;
				gap: 12px;
				border: 2px solid;
				transition: transform 0.2s;
				box-shadow: 0 4px 0 rgba(0, 0, 0, 0.05);
			}

			.result-card:hover {
				transform: translateY(-3px);
			}

			.card-icon {
				width: 40px;
				height: 40px;
				border-radius: 10px;
				display: flex;
				justify-content: center;
				align-items: center;
				color: white;
				flex-shrink: 0;
			}

			.card-content h3 {
				margin: 0;
				font-size: 12px;
				color: #999;
				text-transform: uppercase;
			}
			.card-content p {
				margin: 0;
				font-size: 16px;
				font-weight: 800;
				color: #4b4b4b;
			}

			.card-blue {
				border-color: #1cb0f6;
			}
			.card-blue .card-icon {
				background: #1cb0f6;
			}
			.card-orange {
				border-color: #ff9600;
			}
			.card-orange .card-icon {
				background: #ff9600;
			}
			.card-red {
				border-color: #ff4b4b;
			}
			.card-red .card-icon {
				background: #ff4b4b;
			}
			.card-purple {
				border-color: #ce82ff;
			}
			.card-purple .card-icon {
				background: #ce82ff;
			}

			/* Footer CTA */
			.footer-banner {
				background-color: #58cc02;
				color: white;
				font-weight: 700;
				padding: 15px 30px;
				border-radius: 50px;
				margin: 20px auto 40px;
				display: flex;
				align-items: center;
				gap: 10px;
				box-shadow: 0 6px 0 #46a302;
				z-index: 2;
			}

			/* Responsive Tweaks */
			@media (max-width: 850px) {
				.diagram-container {
					flex-direction: column;
				}
				.output-section {
					grid-template-columns: 1fr;
					width: 100%;
				}
				.magic-arrow {
					transform: rotate(90deg);
					margin: 20px 0;
				}
				.arrow-line {
					width: 40px;
				}
			}
		</style>
	</head>
	<body>
		<div class="slide-container" style="height: 100%">
			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>

			<div
				style="
					display: flex;
					flex-direction: column;
					align-items: center;
					height: 100%;
					justify-content: center;
				"
			>
				<div class="header">
					<div class="badge">Yechim</div>
					<h1>Barcha ma'lumotlar — <span class="highlight">avtomatik</span></h1>
				</div>

				<div class="diagram-container">
					<div class="input-section">
						<div style="color: #afafaf; font-weight: 700; font-size: 14px">SIZ KIRITASIZ</div>
						<div class="kanji-display">先生</div>
						<div style="background: #f7f7f7; padding: 5px; border-radius: 8px; font-size: 12px">
							Faqat iyerogliflar
						</div>
					</div>

					<div class="magic-arrow">
						<i class="fa-solid fa-wand-magic-sparkles"></i>
						<div class="arrow-line"><div class="arrow-head"></div></div>
					</div>

					<div class="output-section">
						<div class="result-card card-blue">
							<div class="card-icon"><i class="fa-solid fa-language"></i></div>
							<div class="card-content">
								<h3>Tarjima</h3>
								<p>O'qituvchi</p>
							</div>
						</div>
						<div class="result-card card-orange">
							<div class="card-icon"><i class="fa-solid fa-microphone-lines"></i></div>
							<div class="card-content">
								<h3>O'qilishi</h3>
								<p>せんせい</p>
							</div>
						</div>
						<div class="result-card card-red">
							<div class="card-icon"><i class="fa-solid fa-layer-group"></i></div>
							<div class="card-content">
								<h3>JLPT</h3>
								<p>N5</p>
							</div>
						</div>
						<div class="result-card card-purple">
							<div class="card-icon"><i class="fa-solid fa-lightbulb"></i></div>
							<div class="card-content">
								<h3>Misollar</h3>
								<p style="font-family: 'Noto Sans JP'">先生は...</p>
							</div>
						</div>
					</div>
				</div>

				<div class="footer-banner">
					<i class="fa-solid fa-check-circle"></i>
					Ortiqcha qo'l mehnatiga hojat yo'q!
				</div>
			</div>
		</div>
	</body>
</html>
