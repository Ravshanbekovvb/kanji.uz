<!doctype html>
<html lang="uz">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>KANJI.UZ - Why Now</title>

		<link
			href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap"
			rel="stylesheet"
		/>
		<link
			href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
			rel="stylesheet"
		/>

		<style>
			body {
				margin: 0;
				padding: 0;
				height: 100vh;
				background-color: #f0f4f8;
				font-family: 'Montserrat', sans-serif;
				display: flex;
				justify-content: center;
				align-items: center;
				overflow: hidden;
			}

			.slide-container {
				width: 100%;
				height: 100vh;
				position: relative;
				display: flex;
				flex-direction: column;
				justify-content: center;
				align-items: center;
				background-color: #ffffff;
				overflow: hidden;
				text-align: center;
				padding: 40px;
				box-sizing: border-box;
			}

			/* Background blobs */
			.blob {
				position: absolute;
				border-radius: 50%;
				z-index: 1;
			}

			.blob-1 {
				width: 500px;
				height: 500px;
				background: #1cb0f6;
				top: -150px;
				left: -150px;
				opacity: 0.08;
			}

			.blob-2 {
				width: 400px;
				height: 400px;
				background: #58cc02;
				bottom: -100px;
				right: -100px;
				opacity: 0.08;
			}

			.content {
				z-index: 2;
				max-width: 900px;
			}

			.badge {
				background-color: #1cb0f6;
				color: white;
				padding: 10px 20px;
				border-radius: 12px;
				font-weight: 800;
				font-size: 14px;
				margin-bottom: 20px;
				display: inline-block;
				box-shadow: 0 4px 0 #0b8ec2;
			}

			h1 {
				font-size: clamp(32px, 6vw, 64px);
				font-weight: 900;
				color: #3c3c3c;
				margin: 0 0 20px 0;
			}

			.highlight {
				color: #58cc02;
			}

			.description {
				font-size: clamp(18px, 2.5vw, 26px);
				color: #666;
				line-height: 1.5;
				font-weight: 600;
				margin-top: 20px;
			}

			.icons {
				margin-top: 40px;
				display: flex;
				justify-content: center;
				gap: 40px;
				font-size: 40px;
				color: #bbb;
			}

			.icons i {
				transition: 0.3s;
			}

			.icons i:hover {
				color: #58cc02;
				transform: scale(1.2);
			}
		</style>
	</head>

	<body>
		<div class="slide-container">
			<div class="blob blob-1"></div>
			<div class="blob blob-2"></div>

			<div class="content">
				<div class="badge">Why Now?</div>

				<h1>
					<!-- Biz <span class="highlight">o‘sib borayotgan</span><br />
					yapon tili bozoridamiz  -->
					私たちは<span class="highlight">成長している</span>日本語市場にいます。
				</h1>

				<div class="description">
					ウズベキスタンでの需要が増加しており、<br />
					日本では労働力の必要性が高まっています。
				</div>

				<div class="icons">
					<i class="fa-solid fa-chart-line"></i>
					<i class="fa-solid fa-globe"></i>
					<i class="fa-solid fa-briefcase"></i>
				</div>
			</div>
		</div>
	</body>
</html>
